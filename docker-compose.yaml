services:
  caddy:
    image: caddy:alpine
    restart: unless-stopped
    ports:
      - "${CADDY_HTTP_PORT:-8083}:8083"
      - "${CADDY_HTTPS_PORT:-8443}:8443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - apollo-api
      - apollo-discord
    networks:
      - apollo

  apollo-api:
    image: apollo-api
    build:
      context: .
      dockerfile: src/Apollo.API/Dockerfile
    expose:
      - "5144"
    env_file:
      - .env
    depends_on:
      - apollo-service
      - redis
    networks:
      - apollo

  apollo-discord:
    image: apollo-discord
    build:
      context: .
      dockerfile: src/Apollo.Discord/Dockerfile
    expose:
      - "5145"
    env_file:
      - .env
    depends_on:
      - apollo-service
      - redis
    networks:
      - apollo

  apollo-service:
    image: apollo-service
    build:
      context: .
      dockerfile: src/Apollo.Service/Dockerfile
    expose:
      - "5270"
    env_file:
      - .env
    depends_on:
      - pgsql
      - redis
    networks:
      - apollo

  pgsql:
    image: postgres
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-apollo}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-apollo}
      - POSTGRES_DB=${POSTGRES_DB:-apollo_db}
    volumes:
      - pgsql_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    networks:
      - apollo

  redis:
    image: redis:alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-apollo_redis}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - apollo
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  pgsql_data:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  apollo:
    driver: bridge
